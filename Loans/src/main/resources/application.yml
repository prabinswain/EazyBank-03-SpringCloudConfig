server:
  port: 8090
spring:
  datasource:
    url: jdbc:h2:mem:prabindb
    driverClassNAme: org.h2.Driver
    username: root
    password: ""
  h2:
    console:
      enabled: true
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
  config:
    import:
      - "application_qa.yml"
      - "application_prod.yml"
  profiles:
    active:
      - "prod"

